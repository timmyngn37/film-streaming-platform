sonar.projectKey=film-streaming-platform
sonar.projectName=film streaming platform
sonar.projectVersion=1.0

# Source configuration
sonar.sources=backend/src
sonar.tests=backend/src/tests

# Advanced exclusions
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.spec.js
sonar.test.exclusions=**/node_modules/**

# Coverage integration
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Duplication exclusions
sonar.cpd.exclusions=**/tests/**

# Issue exclusions
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S125
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.js